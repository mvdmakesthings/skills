name: Release Skills

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package skills
        run: |
          mkdir -p dist
          for skillmd in plugins/*/skills/*/SKILL.md; do
            skill_dir="$(dirname "$skillmd")"
            skill_name="$(basename "$skill_dir")"
            parent_dir="$(dirname "$skill_dir")"
            (cd "$parent_dir" && zip -r "$GITHUB_WORKSPACE/dist/${skill_name}.skill" "$skill_name/")
          done

      - name: Generate release summary
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | sed -n '2p')

          {
            echo "# ${TAG}"
            echo ""

            # What's Included
            echo "## What's Included"
            echo ""
            echo "### Plugins"
            echo ""
            jq -r '.plugins[] | "- **\(.name)** — \(.description)"' .claude-plugin/marketplace.json
            echo ""
            echo "### Skills (download below)"
            echo ""
            for f in dist/*.skill; do
              [ -f "$f" ] && echo "- \`$(basename "$f")\`"
            done
            echo ""

            # What Changed
            if [ -n "$PREV_TAG" ]; then
              echo "## What Changed"
              echo ""
              git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s" --no-merges
              echo ""
            else
              echo "_Initial release._"
              echo ""
            fi
          } > dist/release-body.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-body.md
          generate_release_notes: true
          files: dist/*.skill
