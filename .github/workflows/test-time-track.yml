name: test-time-track

on:
  push:
    paths:
      - 'plugins/track/**'
      - '_dev/track/tests/**'
      - '.github/workflows/test-time-track.yml'
  pull_request:
    paths:
      - 'plugins/track/**'
      - '_dev/track/tests/**'
      - '.github/workflows/test-time-track.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Install bats-core, shellcheck, jq
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck jq

      - name: Configure git identity (needed by preflight)
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name  "CI Bot"

      - name: shellcheck dispatcher
        run: shellcheck plugins/track/bin/track.sh

      - name: bats test suite
        env:
          TRACK_SH: ${{ github.workspace }}/plugins/track/bin/track.sh
        run: bats _dev/track/tests/
